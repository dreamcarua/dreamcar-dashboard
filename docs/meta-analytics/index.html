<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Meta Ads Аналітика · DreamCar</title>
<script src="https://brand.dreamcar.ua/assets/global-header.js?v=20260606b" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;600;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1a1a1a;--line:#222;--steel:#2a2a2a;--txt:#fff;--mut:#888;--grey:#aaa;
    --red:#E30613;--red2:#FF6A7A;--gold:#FBBF24;--green:#10B981;--blue:#60A5FA;--pur:#a5b4fc}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope','JetBrains Mono',system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;}
  a{color:inherit}
  .topbar{background:var(--bg2);border-bottom:2px solid var(--red);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:8px}
  .bm{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:.06em;text-decoration:none}
  .bm .r{color:var(--red)}.bm .mm{font-size:10px;color:var(--mut);letter-spacing:.18em;margin-left:9px;font-family:'JetBrains Mono',monospace}
  .back{color:var(--grey);text-decoration:none;font-size:11.5px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;border:1px solid var(--steel);padding:6px 12px;border-radius:6px;text-transform:uppercase}
  .back:hover{border-color:var(--red);color:#fff}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 80px}
  h1{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.3px}
  h2,h3{font-family:'Oswald',sans-serif}
  .sub{color:var(--mut);font-size:13px;margin-top:5px}
  .toprow{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .upd{font-size:11.5px;color:var(--mut);text-align:right}.upd b{color:var(--green)}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .filters label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace}
  select,.seg{background:var(--bg2);border:1px solid var(--steel);color:#fff;font-family:inherit;font-size:13.5px;padding:8px 12px;border-radius:8px;cursor:pointer}
  select:hover{border-color:var(--red)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
  .tb{background:var(--bg2);border:1px solid var(--steel);color:var(--grey);font-family:inherit;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:9px 15px;border-radius:9px;cursor:pointer;transition:.15s}
  .tb:hover{color:#fff}.tb.on{background:var(--red);border-color:var(--red);color:#fff}
  .tabc{display:none}.tabc.on{display:block;animation:f .2s ease}
  @keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .grid{display:grid;gap:13px}.k4{grid-template-columns:repeat(4,1fr)}.k3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:820px){.k4,.k3{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--bg2);border:1px solid var(--steel);border-radius:12px;padding:15px 16px}
  .kpi .lab{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;font-family:'JetBrains Mono',monospace}
  .kpi .val{font-family:'Oswald',sans-serif;font-size:25px;font-weight:700;margin-top:5px}
  .kpi .meta{font-size:12px;margin-top:3px;color:var(--mut)}
  .up{color:var(--green)}.dn{color:var(--red2)}.neu{color:var(--gold)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:13px}@media(max-width:860px){.two{grid-template-columns:1fr}}
  .chart-card{background:var(--bg2);border:1px solid var(--steel);border-radius:12px;padding:16px 16px 8px}
  .chart-box{position:relative;height:300px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:5px}
  th,td{text-align:right;padding:9px 10px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  tr.cur td{background:rgba(227,6,19,.07)}
  .pill{font-weight:700;padding:2px 7px;border-radius:6px;font-size:12.5px;font-family:'JetBrains Mono',monospace}
  .pg{background:rgba(16,185,129,.15);color:var(--green)}.py{background:rgba(251,191,36,.15);color:var(--gold)}.pr{background:rgba(227,6,19,.16);color:var(--red2)}
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  .t-cur{background:rgba(227,6,19,.18);color:var(--red2)}.t-arc{background:rgba(139,148,158,.14);color:var(--grey)}
  .scroll{overflow-x:auto}
  .note{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.25);border-radius:10px;padding:12px 15px;font-size:13px;color:#cdd9e5;margin:11px 0}
  .rec{border-left:3px solid var(--steel);padding:11px 15px;background:var(--bg3);border-radius:0 10px 10px 0;margin:9px 0;font-size:13.5px}
  .rec.cri{border-color:var(--red)}.rec.mod{border-color:var(--gold)}.rec.inf{border-color:var(--blue)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:7px}
  .legend span{display:inline-flex;align-items:center;gap:5px}.dot{width:9px;height:9px;border-radius:50%}
  .empty{color:var(--mut);font-size:13.5px;padding:30px;text-align:center}
  .flow{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}@media(max-width:820px){.flow{grid-template-columns:1fr}}
  .step{background:var(--bg3);border:1px solid var(--steel);border-radius:11px;padding:13px 14px;position:relative}
  .step .sn{position:absolute;top:-9px;left:13px;background:var(--red);color:#fff;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .step h4{font-size:13.5px;margin:7px 0 5px}.step .ex{font-size:12px;color:var(--grey);font-style:italic;background:#0e0e0e;border-radius:7px;padding:7px 9px;margin-top:6px}
  .chip{display:inline-block;background:var(--bg3);border:1px solid var(--steel);border-radius:20px;padding:3px 10px;font-size:12px;margin:3px 3px 0 0}
  .foot{margin-top:34px;padding-top:14px;border-top:1px solid var(--line);color:var(--mut);font-size:12px}
  b.hl{color:#fff}
</style>
</head>
<body>
<div class="topbar">
  <a class="bm" href="/"><span class="r">DREAM</span>CAR<span class="mm">Meta Analytics</span></a>
  <a class="back" href="/">← Дашборд</a>
</div>
<div class="wrap">
  <div class="toprow">
    <div>
      <h1>Meta Ads Аналітика</h1>
      <div class="sub">Акаунт <span id="acc">—</span> · по ВСІХ проєктах · авто-оновлення з Meta + CRM</div>
    </div>
    <div class="upd">оновлено <b id="gen">—</b><br>джерело: Meta API + Supabase</div>
  </div>

  <div class="filters">
    <label for="projSel">Проєкт</label>
    <select id="projSel"></select>
    <label for="scopeSel" style="margin-left:8px">Показ</label>
    <select id="scopeSel">
      <option value="all">Усі</option>
      <option value="current">Поточні цикли</option>
      <option value="archive">Архів</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tb on" data-tab="overview">🗂 Огляд</button>
    <button class="tb" data-tab="segments">🎯 Сегменти</button>
    <button class="tb" data-tab="creatives">🎬 Креативи</button>
    <button class="tb" data-tab="reconcile">⚖️ Pixel ↔ Реал</button>
    <button class="tb" data-tab="recs">💡 Рекомендації</button>
    <button class="tb" data-tab="formula">🧬 Формула</button>
  </div>

  <div class="tabc on" id="tab-overview"></div>
  <div class="tabc" id="tab-segments"></div>
  <div class="tabc" id="tab-creatives"></div>
  <div class="tabc" id="tab-reconcile"></div>
  <div class="tabc" id="tab-recs"></div>
  <div class="tabc" id="tab-formula"></div>

  <div class="foot" id="foot">Завантаження…</div>
</div>

<script>
const C={red:'#E30613',red2:'#FF6A7A',gold:'#FBBF24',green:'#10B981',blue:'#60A5FA',grey:'#888',pur:'#a5b4fc',ig:'#FF6A7A'};
const fmt=n=>(n==null?'—':Math.round(n).toLocaleString('uk-UA'));
const f2=n=>(n==null?'—':Number(n).toFixed(2));
let DATA=null, SEL='all', SCOPE='all', charts={};
Chart.defaults.color='#888';Chart.defaults.font.family="'JetBrains Mono',monospace";
const gx={grid:{color:'#1c1c1c'}};
function roasPill(v){const c=v>=5?'pg':v>=3?'py':'pr';return `<span class="pill ${c}">${f2(v)}</span>`;}
function mk(id,cfg){const el=document.getElementById(id);if(!el)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(el,cfg);}
function visibleProjects(){
  let ps=DATA.projects.slice();
  if(SCOPE==='current') ps=ps.filter(p=>p.is_current);
  else if(SCOPE==='archive') ps=ps.filter(p=>!p.is_current);
  return ps;
}
function curProject(){ return DATA.projects.find(p=>p.code===SEL) || null; }

/* ---------- OVERVIEW ---------- */
function renderOverview(){
  const el=document.getElementById('tab-overview');
  const ps=visibleProjects();
  const tot=ps.reduce((a,p)=>({s:a.s+(p.spend||0),pu:a.pu+(p.purchases||0),pr:a.pr+(p.pixel_revenue||0),rr:a.rr+(p.real_ad_revenue||0)}),{s:0,pu:0,pr:0,rr:0});
  const avgPx=tot.s?tot.pr/tot.s:0, avgReal=tot.s?tot.rr/tot.s:0;
  let h=`<div class="grid k4">
    <div class="card kpi"><div class="lab">Проєктів</div><div class="val">${ps.length}</div><div class="meta">у вибірці</div></div>
    <div class="card kpi"><div class="lab">Витрати</div><div class="val">${(tot.s/1e6).toFixed(2)}М ₴</div><div class="meta">сумарно</div></div>
    <div class="card kpi"><div class="lab">Сер. ROAS pixel</div><div class="val neu">${f2(avgPx)}</div><div class="meta">зважений</div></div>
    <div class="card kpi"><div class="lab">Сер. ROAS реал</div><div class="val up">${f2(avgReal)}</div><div class="meta">по UTM-мітках</div></div>
  </div>
  <div class="chart-card" style="margin-top:13px"><h3 style="margin:2px 0 8px">Витрати vs ROAS по проєктах</h3><div class="chart-box" style="height:320px"><canvas id="cOv"></canvas></div>
    <div class="legend"><span><i class="dot" style="background:${C.red}"></i>Витрати ₴</span><span><i class="dot" style="background:${C.gold}"></i>ROAS pixel</span><span><i class="dot" style="background:${C.green}"></i>ROAS реал</span></div></div>
  <div class="card scroll" style="margin-top:13px"><table><thead><tr><th>Проєкт</th><th>Період</th><th>Витрати ₴</th><th>Покупки</th><th>CPA ₴</th><th>ROAS pixel</th><th>ROAS реал</th></tr></thead><tbody>`;
  ps.forEach(p=>{ h+=`<tr class="${p.is_current?'cur':''}"><td>${p.name} <span class="tag ${p.is_current?'t-cur':'t-arc'}">${p.is_current?'цикл':'архів'}</span></td>
    <td style="color:#888;font-size:12px">${(p.date_from||'').slice(5)}→${(p.date_to||'').slice(5)}</td>
    <td>${fmt(p.spend)}</td><td>${fmt(p.purchases)}</td><td>${f2(p.cpa)}</td><td>${roasPill(p.pixel_roas)}</td><td>${roasPill(p.real_ad_roas)}</td></tr>`; });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
  mk('cOv',{data:{labels:ps.map(p=>p.name),datasets:[
    {type:'bar',label:'Витрати',data:ps.map(p=>Math.round(p.spend||0)),backgroundColor:ps.map(p=>p.is_current?C.red:'#E3061399'),yAxisID:'y',borderRadius:5,order:3},
    {type:'line',label:'pixel',data:ps.map(p=>p.pixel_roas),borderColor:C.gold,backgroundColor:C.gold,yAxisID:'y1',tension:.3,pointRadius:3,order:1},
    {type:'line',label:'реал',data:ps.map(p=>p.real_ad_roas),borderColor:C.green,backgroundColor:C.green,yAxisID:'y1',tension:.3,pointRadius:3,order:0}]},
   options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{...gx,title:{display:true,text:'₴'}},y1:{position:'right',grid:{drawOnChartArea:false},min:0,title:{display:true,text:'ROAS'}},x:{...gx,ticks:{font:{size:9}}}}}});
}

/* ---------- SEGMENTS ---------- */
function segChart(id,rows,donut){
  if(!rows||!rows.length)return;
  if(donut){ mk(id,{type:'doughnut',data:{labels:rows.map(r=>r[0]),datasets:[{data:rows.map(r=>Math.round(r[1])),backgroundColor:[C.ig,C.red,C.blue,C.grey,C.gold,C.green],borderColor:'#141414',borderWidth:3}]},options:{maintainAspectRatio:false,cutout:'56%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:9,font:{size:10}}}}}}); return; }
  mk(id,{data:{labels:rows.map(r=>r[0]),datasets:[
    {type:'bar',label:'Витрати',data:rows.map(r=>Math.round(r[1])),backgroundColor:'#E3061399',yAxisID:'y',borderRadius:4,order:2},
    {type:'line',label:'ROAS',data:rows.map(r=>r[3]),borderColor:C.green,backgroundColor:C.green,yAxisID:'y1',tension:.25,pointRadius:3,order:1}]},
   options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:gx,y1:{position:'right',grid:{drawOnChartArea:false},min:0,title:{display:true,text:'ROAS'}},x:{...gx,ticks:{font:{size:9}}}}}});
}
function renderSegments(){
  const el=document.getElementById('tab-segments'); const p=curProject();
  if(!p){ el.innerHTML=`<div class="note">Оберіть конкретний проєкт у фільтрі вгорі, щоб побачити сегменти (платформа, плейсмент, вік, стать, пристрій).</div>`; return; }
  const s=p.segments||{};
  el.innerHTML=`<div class="note"><b class="hl">${p.name}</b> · ${p.date_from}→${p.date_to}. Сегменти по рекламному акаунту (піксель Meta).</div>
   <div class="two">
     <div class="chart-card"><h3 style="margin:2px 0 6px">Платформа</h3><div class="chart-box"><canvas id="sPlat"></canvas></div></div>
     <div class="chart-card"><h3 style="margin:2px 0 6px">Вік × ROAS</h3><div class="chart-box"><canvas id="sAge"></canvas></div></div>
   </div>
   <div class="two" style="margin-top:13px">
     <div class="chart-card"><h3 style="margin:2px 0 6px">Стать</h3><div class="chart-box"><canvas id="sGen"></canvas></div></div>
     <div class="chart-card"><h3 style="margin:2px 0 6px">Пристрій</h3><div class="chart-box"><canvas id="sDev"></canvas></div></div>
   </div>
   ${(s.placement&&s.placement.length)?`<div class="chart-card" style="margin-top:13px"><h3 style="margin:2px 0 6px">Плейсмент (розподіл витрат)</h3><div class="chart-box"><canvas id="sPlace"></canvas></div></div>`:''}`;
  segChart('sPlat',s.platform,true);
  segChart('sAge',s.age,false);
  segChart('sGen',s.gender,true);
  segChart('sDev',s.device,true);
  if(s.placement&&s.placement.length){ mk('sPlace',{type:'bar',data:{labels:s.placement.map(r=>r[0]),datasets:[{label:'Витрати',data:s.placement.map(r=>Math.round(r[1])),backgroundColor:'#E30613aa',borderRadius:4}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:gx,x:{...gx,ticks:{font:{size:9}}}}}}); }
}

/* ---------- CREATIVES ---------- */
function renderCreatives(){
  const el=document.getElementById('tab-creatives'); const p=curProject();
  if(!p){ el.innerHTML=`<div class="note">Оберіть проєкт, щоб побачити топ-креативи.</div>`; return; }
  const cr=(p.creatives||[]);
  if(!cr.length){ el.innerHTML=`<div class="empty">Немає даних по креативах для «${p.name}».</div>`; return; }
  let h=`<div class="note"><b class="hl">${p.name}</b> — топ креативи за ROAS.</div><div class="card scroll"><table><thead><tr><th>#</th><th>Креатив</th><th>Витрати ₴</th><th>Покупки</th><th>ROAS</th><th>CTR</th></tr></thead><tbody>`;
  cr.forEach((c,i)=>{ h+=`<tr><td>${i+1}</td><td>${c.name}</td><td>${fmt(c.spend)}</td><td>${fmt(c.purchases)}</td><td>${roasPill(c.roas)}</td><td>${f2(c.ctr)}%</td></tr>`; });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

/* ---------- RECONCILE ---------- */
function renderReconcile(){
  const el=document.getElementById('tab-reconcile'); const ps=visibleProjects();
  let h=`<div class="note"><b class="hl">Pixel vs Реал.</b> Pixel — атрибуція Meta. Реал — виручка по UTM-мітках реклами (utm_source=facebook+instagram), <b>без ретеншну/органіки</b>. «Розрив» = наскільки реал відрізняється від пікселя.</div>
   <div class="card scroll"><table><thead><tr><th>Проєкт</th><th>Витрати ₴</th><th>Pixel дохід</th><th>Pixel ROAS</th><th>Реал дохід (реклама)</th><th>Реал ROAS</th><th>Розрив</th></tr></thead><tbody>`;
  ps.forEach(p=>{ const gap=p.gap_pct; h+=`<tr class="${p.is_current?'cur':''}"><td>${p.name}</td><td>${fmt(p.spend)}</td><td>${fmt(p.pixel_revenue)}</td><td>${roasPill(p.pixel_roas)}</td><td>${fmt(p.real_ad_revenue)}</td><td>${roasPill(p.real_ad_roas)}</td><td><span style="color:${gap==null?'#888':gap<0?C.red2:C.green}">${gap==null?'—':(gap>0?'+':'')+gap.toFixed(0)+'%'}</span></td></tr>`; });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

/* ---------- RECOMMENDATIONS ---------- */
function renderRecs(){
  const el=document.getElementById('tab-recs'); const ps=SEL==='all'?visibleProjects():[curProject()].filter(Boolean);
  let h='';
  ps.forEach(p=>{
    const rs=p.recommendations||[];
    h+=`<h3 style="margin:18px 0 8px">${p.name} <span class="tag ${p.is_current?'t-cur':'t-arc'}">${p.is_current?'цикл':'архів'}</span></h3>`;
    if(!rs.length){ h+=`<div class="rec inf">Критичних рекомендацій немає — показники в нормі.</div>`; }
    rs.forEach(r=>{ h+=`<div class="rec ${r.sev}">${r.text}</div>`; });
  });
  h+=`<div class="note" style="margin-top:16px">Дії з цих рекомендацій ставляться у <b>TASK-систему</b> (<a href="https://team.dreamcar.ua/tasks/" target="_blank" style="color:${C.red2}">team.dreamcar.ua/tasks</a>). Авто-постинг рекомендацій у задачі — у плані.</div>`;
  el.innerHTML=h;
}

/* ---------- FORMULA (static) ---------- */
function renderFormula(){
  document.getElementById('tab-formula').innerHTML=`
  <div class="note">Бриф для дизайнерів. Формула на основі переможців. Відео-«перший пост» — головний драйвер.</div>
  <h3 style="margin:14px 0 8px">Структура копії — 6 блоків</h3>
  <div class="flow">
   <div class="step"><span class="sn">1</span><h4>Гачок-емоція</h4><div class="ex">«Свобода двох коліс ближче, ніж будь-коли!»</div></div>
   <div class="step"><span class="sn">2</span><h4>Біль/прокрастинація</h4><div class="ex">«Давно мріяв, але відкладав на потім?»</div></div>
   <div class="step"><span class="sn">3</span><h4>Об'єкт + поріг</h4><div class="ex">«Отримай приз — від 99 грн»</div></div>
   <div class="step"><span class="sn">4</span><h4>Підсилення</h4><div class="ex">«Дорога, швидкість, адреналін, свобода»</div></div>
   <div class="step"><span class="sn">5</span><h4>Дедлайн + ефір</h4><div class="ex">«Stop — дата · Прямий ефір — дата, час»</div></div>
   <div class="step"><span class="sn">6</span><h4>М'який заклик</h4><div class="ex">«Обирай токени, наближуй мрію»</div></div>
  </div>
  <div class="note" style="margin-top:13px;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)"><b class="hl">⚠️ Комплаєнс:</b> уникати «квиток / розіграш / шанс виграти». Заміни:
   <span class="chip" style="color:${C.green}">токени ШІ-сервісу</span><span class="chip" style="color:${C.green}">обери приз серед учасників</span><span class="chip" style="color:${C.green}">можливість отримати</span></div>
  <div class="note">Формат: <b class="hl">2-3 вертикальні відео + 5-6 фото + 1 мем</b>. Гачок ≤3 сек, субтитри, дедлайн на фінальному кадрі. Тестувати креативи всередині одного ad set.</div>`;
}

const RENDER={overview:renderOverview,segments:renderSegments,creatives:renderCreatives,reconcile:renderReconcile,recs:renderRecs,formula:renderFormula};
let curTab='overview';
function renderAll(){ RENDER[curTab](); }

function initSelectors(){
  const sel=document.getElementById('projSel');
  function fill(){
    const ps=visibleProjects();
    sel.innerHTML='<option value="all">— Усі проєкти (огляд) —</option>'+ps.map(p=>`<option value="${p.code}">${p.name}${p.is_current?' • цикл':''}</option>`).join('');
    if(![...sel.options].some(o=>o.value===SEL)) SEL='all';
    sel.value=SEL;
  }
  fill();
  sel.addEventListener('change',()=>{SEL=sel.value;renderAll();});
  document.getElementById('scopeSel').addEventListener('change',e=>{SCOPE=e.target.value;fill();SEL='all';sel.value='all';renderAll();});
}

document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tabc').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); curTab=b.dataset.tab;
  document.getElementById('tab-'+curTab).classList.add('on'); renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}));

fetch('data.json?_='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;
  document.getElementById('acc').textContent=d.account||'—';
  document.getElementById('gen').textContent=(d.generated||'').slice(0,16).replace('T',' ');
  document.getElementById('foot').innerHTML='Джерело: Meta Marketing API + Supabase (dashboard_projects_with_stats, dashboard_agg_deals_with_traffic). Реал ROAS = виручка по UTM-мітках facebook+instagram. Дані оновлюються щодня автоматично (GitHub Action).';
  initSelectors(); renderFormula(); renderAll();
}).catch(e=>{ document.getElementById('foot').textContent='Помилка завантаження data.json: '+e; });
</script>
