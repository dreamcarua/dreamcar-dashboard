name: ETL MySQL → Supabase (hourly)

on:
  schedule:
    - cron: '0 * * * *'  # Кожна година
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'incremental'
        type: choice
        options: [incremental, initial]
      only:
        description: 'Tables to sync'
        required: true
        default: 'all'
        type: choice
        options: [all, deals, webhooks, ads]
      limit:
        description: 'Limit rows (для тесту, порожнє = без обмежень)'
        required: false
        default: ''

concurrency:
  group: etl-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install deps
        run: pip install -r etl/requirements.txt

      - name: Run ETL
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_DB:   ${{ secrets.MYSQL_DB }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          ONLY="${{ github.event.inputs.only || 'all' }}"
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit=${{ github.event.inputs.limit }}"
          fi
          python etl/sync_mysql_to_supabase.py --mode="$MODE" --only="$ONLY" $LIMIT_ARG
