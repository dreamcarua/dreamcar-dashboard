name: ETL SendPulse deals → Supabase (Phase 2, manual launch)

# 09.06.2026 #202: Phase 2 ETL replacing Make.com middleman.
# Поки тільки workflow_dispatch — після першого успішного manual run
# Вадим може дописати repository_dispatch trigger.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'incremental'
        type: choice
        options: [incremental, initial]
      dry_run:
        description: 'Dry run (no upsert)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      limit:
        description: 'Max deals (default 10000)'
        required: false
        default: '10000'
  repository_dispatch:
    types: [etl-sendpulse]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: etl/requirements.txt
      - name: Install deps
        run: pip install -r etl/requirements.txt
      - name: Run SendPulse → Supabase sync
        env:
          SP_USER_ID:                ${{ secrets.SP_USER_ID }}
          SP_USER_SECRET:            ${{ secrets.SP_USER_SECRET }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          LIMIT="${{ github.event.inputs.limit || '10000' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--mode=$MODE --limit=$LIMIT"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python etl/sync_sendpulse_deals.py $ARGS
