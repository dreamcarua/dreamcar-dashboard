name: Meta Stats → data.json (daily)

# ІЗОЛЬОВАНИЙ pipeline для розділу /meta-analytics/.
# Тягне Meta Ads по ВСІХ проєктах + реальну виручку (RPC) -> docs/meta-analytics/data.json.
# НЕ чіпає БД-таблиць і файлів дашборду. Окрема concurrency-група.

on:
  schedule:
    - cron: "30 5 * * *"   # 08:30 Kyiv щодня
  workflow_dispatch:

concurrency:
  group: meta-stats-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install deps
        run: pip install -r etl/requirements.txt

      - name: Build data.json
        env:
          FB_ACCESS_TOKEN:           ${{ secrets.FB_ACCESS_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/sync_meta_stats.py

      - name: Commit data.json if changed
        run: |
          git config user.name  "dreamcar-bot"
          git config user.email "bot@dreamcar.ua"
          git add docs/meta-analytics/data.json
          if git diff --cached --quiet; then
            echo "no changes in data.json"; exit 0
          fi
          git commit -m "chore(meta-stats): оновлення data.json [skip ci]"
          # rebase щоб не зіткнутись із паралельними пушами дашборд-чату
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            echo "retry push $i"; sleep 5
          done
